name: Build and deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node (Quartz requires Node >= 22)
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      # Ensure npm is new enough (Quartz requires npm >= 10.9.2)
      - name: Upgrade npm
        run: npm i -g npm@^10.9.2

      - name: Install deps
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Disable Jekyll
        run: |
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public
          name: github-pages

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
