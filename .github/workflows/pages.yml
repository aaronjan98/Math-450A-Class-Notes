name: Build and deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.upload.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npx quartz build

      - name: Disable Jekyll (prevent Pages from trying to process repo with Jekyll)
        run: |
          mkdir -p public
          touch public/.nojekyll

      - name: Upload artifact for GitHub Pages
        id: upload
        # Use the v4 tag of the upload-pages-artifact action
        uses: actions/upload-pages-artifact@v4
        with:
          # Give the artifact a unique name per workflow run
          name: pages-artifact-${{ github.run_id }}
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        # Use v4 of the deploy-pages action
        uses: actions/deploy-pages@v4
        with:
          artifact_id: ${{ needs.build-and-deploy.outputs.page_url || steps.upload.outputs.artifact_id }}
